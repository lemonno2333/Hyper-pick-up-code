name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Download dependencies
        run: ./gradlew dependencies --no-daemon
        continue-on-error: true


      - name: Build Release APK
        env:
          KEY_STORE_PATH: release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace --info -Porg.gradle.user.home=$HOME/.gradle

      - name: Verify APK signature
        run: |
          echo "=== 验证 APK ==="
          ANDROID_HOME="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          APKSIGNER="$ANDROID_HOME/build-tools/36.1.0/apksigner"
          APK="app/build/outputs/apk/release/app-release.apk"
          SIGNATURE=$($APKSIGNER verify --print-certs "$APK" | grep "SHA-256 digest" | sed "s/.*: //")
          echo "签名 SHA-256: $SIGNATURE"
          EXPECTED_SIGNATURE="9400b749bcd477daa317c4026d25ec97dd033be3b748fd89e42a989a093b97ca"
          if [ "$SIGNATURE" != "$EXPECTED_SIGNATURE" ]; then
            echo "❌ 签名不匹配!"
            exit 1
          fi
          echo "✅ 签名验证通过"

      - name: Check if pre-release
        id: check_prerelease
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | head -1 | sed 's/.*origin\///' | xargs)
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == "dev" ]] || [[ "$BRANCH" == "Dev" ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Read changelog
        id: changelog
        run: |
          if [ -f changelog.txt ]; then
            CHANGELOG=$(cat changelog.txt)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=无更新日志" >> $GITHUB_OUTPUT
          fi

      - name: Generate version JSON
        env:
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ steps.check_prerelease.outputs.is_prerelease }}
        run: |
          python3 -c "
          import re, json, os, hashlib

          # 计算 APK MD5
          apk_path = 'app/build/outputs/apk/release/app-release.apk'
          if os.path.exists(apk_path):
              with open(apk_path, 'rb') as f:
                  md5_hash = hashlib.md5(f.read()).hexdigest()
          else:
              md5_hash = 'APK_NOT_FOUND'

          with open('app/build.gradle.kts', 'r') as f:
              content = f.read()

          code_match = re.search(r'versionCode\s*=\s*(\d[\d_]*)', content)
          name_match = re.search(r'versionName\s*=\s*\"([^\"]*)\"', content)

          version_code = int(code_match.group(1).replace('_', '')) if code_match else 0
          version_name = name_match.group(1) if name_match else '0.0.0'

          with open('changelog.txt', 'r') as f:
              changelog = f.read().strip()

          tag_name = os.environ['TAG_NAME']
          is_prerelease = os.environ['IS_PRERELEASE']

          data = {
              'versionCode': version_code,
              'versionName': version_name,
              'releaseNotes': changelog,
              'downloadUrl': 'https://github.com/badnng/Hyper-pick-up-code/releases/download/' + tag_name + '/app-release.apk',
              'md5': md5_hash
          }

          if is_prerelease == 'true':
              files = ['Dev.json']
          else:
              files = ['Stable.json', 'Dev.json']

          for f in files:
              with open(f, 'w') as fp:
                  json.dump(data, fp, ensure_ascii=False, indent=2)
              print('Generated ' + f)
          "

      - name: Commit JSON to master
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          IS_PRERELEASE=${{ steps.check_prerelease.outputs.is_prerelease }}

          if [ "$IS_PRERELEASE" = "true" ]; then
            FILES="Dev.json"
          else
            FILES="Stable.json Dev.json"
          fi

          # 保存 JSON 文件到临时目录
          mkdir -p /tmp/json_files
          for f in $FILES; do
            cp $f /tmp/json_files/
          done

          # 切换到 master 分支
          git checkout -f master

          # 用临时目录的文件覆盖 master 分支
          for f in $FILES; do
            cp /tmp/json_files/$f $f
            git add $f
          done

          # 提交
          echo "=== 暂存区文件 ==="
          git diff --cached --stat

          git diff --cached --quiet || git commit -m "Update JSON for ${{ github.ref_name }}"
          git push origin master
      

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## 更新内容
            ${{ steps.changelog.outputs.content }}
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
