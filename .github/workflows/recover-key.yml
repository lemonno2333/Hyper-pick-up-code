name: Recover Keystore

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          ls -la release.jks
          sha256sum release.jks

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recovered-keystore
          path: release.jks
          retention-days: 1
